spring:
  application:
    name: roofing-crm-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/roofing_crm
    username: ${DB_USERNAME:roofing_crm_user}
    password: ${DB_PASSWORD:roofing_crm_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: ${APP_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${APP_MULTIPART_MAX_REQUEST_SIZE:20MB}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:3000}
  cors:
    allowed-origins:
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
      - "https://roofing-crm-xi.vercel.app"
    # If you need wildcards in the future, prefer patterns:
    # allowed-origin-patterns:
    #   - "https://*.example.com"
    allowed-methods: [GET, POST, PUT, DELETE, OPTIONS]
    allowed-headers: [Authorization, Content-Type, X-Tenant-Id, Location]
    allow-credentials: true
    max-age: 3600
  security:
    jwt:
      secret: "REPLACE_WITH_A_LONG_RANDOM_SECRET_KEY_FOR_DEV_ONLY_MIN_32_CHARS"
      expiration-seconds: 36000
  storage:
    local:
      base-dir: "./uploads"
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    provider: ${APP_MAIL_PROVIDER:resend}
    from-email: ${APP_MAIL_FROM_EMAIL:}
    from-name: ${APP_MAIL_FROM_NAME:VivaCRM}
    resend:
      api-key: ${APP_MAIL_RESEND_API_KEY:}
  ai:
    receipt-extraction:
      enabled: ${APP_RECEIPT_EXTRACTION_ENABLED:false}
      debug-write-summary-images: ${APP_RECEIPT_EXTRACTION_DEBUG_WRITE_SUMMARY_IMAGES:false}
      provider: ${APP_RECEIPT_EXTRACTION_PROVIDER:openai}
      openai:
        base-url: ${APP_RECEIPT_EXTRACTION_OPENAI_BASE_URL:https://api.openai.com}
        api-key: ${APP_RECEIPT_EXTRACTION_OPENAI_API_KEY:}
        model: ${APP_RECEIPT_EXTRACTION_OPENAI_MODEL:gpt-4o-mini}
        connect-timeout-seconds: ${APP_RECEIPT_EXTRACTION_OPENAI_CONNECT_TIMEOUT_SECONDS:10}
        read-timeout-seconds: ${APP_RECEIPT_EXTRACTION_OPENAI_READ_TIMEOUT_SECONDS:45}
        max-retries: ${APP_RECEIPT_EXTRACTION_OPENAI_MAX_RETRIES:1}
    receipt-ocr:
      enabled: ${APP_RECEIPT_OCR_ENABLED:false}
      provider: ${APP_RECEIPT_OCR_PROVIDER:tesseract}
      tessdata-path: ${APP_RECEIPT_OCR_TESSDATA_PATH:}
      language: ${APP_RECEIPT_OCR_LANGUAGE:eng}
      # When false (default), OCR never suppresses OpenAI vision based on text length alone.
      allow-ocr-text-length-to-skip-vision: ${APP_RECEIPT_OCR_ALLOW_TEXT_LENGTH_TO_SKIP_VISION:false}
      min-full-text-chars-to-skip-full-vision: ${APP_RECEIPT_OCR_MIN_FULL_TEXT_CHARS_TO_SKIP_FULL_VISION:80}
      min-summary-text-chars-to-skip-summary-vision: ${APP_RECEIPT_OCR_MIN_SUMMARY_TEXT_CHARS_TO_SKIP_SUMMARY_VISION:40}
      min-chars-for-usable-ocr: ${APP_RECEIPT_OCR_MIN_CHARS_FOR_USABLE_OCR:20}